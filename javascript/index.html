<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JS Interactive Lab</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #020617; /* Más oscuro */
            font-family: 'Inter', system-ui, sans-serif;
            user-select: none;
        }

        #canvas1 {
            position: absolute;
            top: 0; left: 0;
        }

        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
        }

        h1 { font-size: 1.5rem; margin: 0; color: #38bdf8; }
        .controls { font-size: 0.9rem; opacity: 0.7; margin-top: 5px; }
        
        /* Pequeño badge de tecnología */
        .badge {
            display: inline-block;
            background: #38bdf8;
            color: #020617;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.7rem;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        <span class="badge">JAVASCRIPT CORE</span>
        <h1>Partículas Inteligentes</h1>
        <div class="controls">
            🖱️ Mueve para repeler <br>
            👆 Clic para estallar <br>
            🎨 Doble clic para cambiar color
        </div>
    </div>
    
    <canvas id="canvas1"></canvas>

    <script>
        const canvas = document.getElementById("canvas1");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray;
        let hue = 197; // El color inicial (celeste)
        
        let mouse = {
            x: null,
            y: null,
            radius: 150 // Radio de interacción
        };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        // EXPLOSIÓN AL CLIC
        window.addEventListener('mousedown', (e) => {
            for(let i=0; i<10; i++) {
                particlesArray.push(new Particle(e.x, e.y));
            }
        });

        // CAMBIO DE COLOR AL DOBLE CLIC
        window.addEventListener('dblclick', () => {
            hue = Math.random() * 360;
        });

        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                
                // Velocidad base
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 30) + 1;
                
                this.vx = (Math.random() * 2) - 1;
                this.vy = (Math.random() * 2) - 1;
            }

            draw() {
                ctx.fillStyle = `hsla(${hue}, 100%, 70%, 0.8)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }

            update() {
                // Movimiento constante
                this.x += this.vx;
                this.y += this.vy;

                // Rebote en bordes
                if (this.x > canvas.width || this.x < 0) this.vx *= -1;
                if (this.y > canvas.height || this.y < 0) this.vy *= -1;

                // Lógica de REPULSIÓN del mouse
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < mouse.radius) {
                    const forceDirectionX = dx / distance;
                    const forceDirectionY = dy / distance;
                    const force = (mouse.radius - distance) / mouse.radius;
                    const directionX = forceDirectionX * force * this.density;
                    const directionY = forceDirectionY * force * this.density;
                    
                    this.x -= directionX;
                    this.y -= directionY;
                }
            }
        }

        function init() {
            particlesArray = [];
            let n = (canvas.height * canvas.width) / 9000;
            for (let i = 0; i < n; i++) {
                particlesArray.push(new Particle());
            }
        }

        function connect() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let dx = particlesArray[a].x - particlesArray[b].x;
                    let dy = particlesArray[a].y - particlesArray[b].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 100) {
                        ctx.strokeStyle = `hsla(${hue}, 100%, 70%, ${1 - distance/100})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(2, 6, 23, 0.2)'; // Estela de movimiento
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            connect();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = innerWidth;
            canvas.height = innerHeight;
            init();
        });

        init();
        animate();
    </script>
</body>
</html>
